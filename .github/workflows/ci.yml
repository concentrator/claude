name: CI

# Gates PRs into the default branch. Runs only on pull_request, so it
# never re-judges the direct-to-main bootstrap commits already in history.
on:
  pull_request:

jobs:
  tier1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history: check-ledger needs ancestor/diff
      - name: Tier-1 mechanical checks
        run: bash scripts/ci/run-all.sh
